<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>ページが見つかりません｜PBC合宿2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100svh;
    display: grid;
    place-content: center;
    text-align: center;
    background: #F5F1E8;
    color: #3A3833;
    font-family: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    letter-spacing: .08em;

  }
  .code {
    font-family: "Cormorant Garamond", Georgia, serif;

    font-weight: 400;
    letter-spacing: .2em;
    color: #1C2B4A;
    margin: 0;
  }
  .tick { width: 28px; height: 2px; background: #C9502F; margin: 20px auto; }
  p { font-size: .9375rem; margin: 0 0 2em; }
  a { color: #1C2B4A; text-underline-offset: 4px; }
</style>
</head>
<body>
<div>
  <p class="code">404</p>
  <div class="tick" aria-hidden="true"></div>
  <p>お探しのページは見つかりませんでした。</p>
  <p><a href="/">トップページへ戻る</a></p>
